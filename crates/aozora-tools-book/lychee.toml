# lychee configuration for the aozora-tools handbook.
#
# Used by:
#   - local validation: `lychee --config crates/aozora-tools-book/lychee.toml crates/aozora-tools-book/book/`
#   - `.github/workflows/docs.yml` `lychee` job

# --- output ------------------------------------------------------------
no_progress = true
verbose     = "info"

# --- concurrency / timing ---------------------------------------------
# Per-host throttle is on by default; raising global concurrency does
# not flood any single domain.
max_concurrency = 16
timeout         = 20

# Retry transient failures (connection reset, DNS hiccup, 5xx) up to
# 5 times with backoff. CI runners hit occasional TCP-level bounces on
# crates.io / github.com that resolve on retry; failing the gate on
# the first such bounce turns CI signal into noise.
max_retries     = 5
retry_wait_time = 3

max_redirects = 5

# --- request deduplication --------------------------------------------
# On-disk cache collapses duplicate requests within a run and lets a
# re-run inside `max_cache_age` skip already-checked URLs.
cache         = true
max_cache_age = "1d"

# --- HTTP behaviour ----------------------------------------------------
user_agent = "lychee/aozora-tools-book"
accept     = ["200..=299", "429", "999"]

# --- exclusions --------------------------------------------------------
# `book/404.html` is mdbook's auto-generated 404 page; it carries
# `/aozora-tools/` site-root absolute links that only resolve under the
# live Pages deploy.
exclude_path = ["book/404.html"]

exclude = [
    # `book/api/` is the rustdoc subtree mounted under the Pages
    # deploy by docs.yml. It does not exist in the locally-built
    # `book/` directory, so a local lychee run sees the `./api/`
    # relative link as a missing path; on the deployed site it is
    # always reachable.
    "^file://.*/book/api/?$",

    # docs.rs renders the *latest published* version of a crate. The
    # handbook references APIs added in a release that's still
    # in-flight — every such page returns 404 until the tag is cut.
    # Excluding the `aozora*` namespace skips false negatives without
    # losing coverage of external references.
    "^https?://docs\\.rs/aozora",

    # GitHub repo links into our own `main` branch resolve only after
    # the PR introducing them is merged. Pre-merge lychee runs see
    # them as 404 because the file genuinely doesn't exist on `main`
    # yet.
    "^https?://github\\.com/[^/]+/aozora-tools/(blob|edit|tree)/main/",
]
