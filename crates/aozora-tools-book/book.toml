[book]
title    = "aozora-tools — Editor Tooling Handbook"
authors  = ["aozora-tools contributors"]
language = "en"
src      = "src"

[rust]
edition = "2024"

[output.html]
default-theme        = "light"
preferred-dark-theme = "ayu"
git-repository-url   = "https://github.com/P4suta/aozora-tools"
edit-url-template    = "https://github.com/P4suta/aozora-tools/edit/main/crates/aozora-tools-book/{path}"
site-url             = "/aozora-tools/"
additional-css       = []
additional-js        = ["mermaid.min.js", "mermaid-init.js"]

[output.html.fold]
enable = true
level  = 1

[output.html.search]
enable          = true
use-boolean-and = true

# mdbook-mermaid renders ```mermaid blocks as SVG. Used in
# vscode/architecture.md and lsp/state-model.md for component diagrams.
[preprocessor.mermaid]
command = "mdbook-mermaid"

[output.html.playground]
runnable = false

# `mdbook-linkcheck` is intentionally NOT wired in: the upstream
# `mdbook-linkcheck` releases lag the `RenderContext` schema in recent
# `mdbook` versions and the integration breaks. Internal + external link
# verification is performed by `lychee` instead — invoked locally and
# from the `lychee` job in `.github/workflows/docs.yml`.
