# Publish the aozora-tools rustdoc API reference to GitHub Pages.
#
# Layout produced:
#   https://p4suta.github.io/aozora-tools/                ← redirect to /aozora_lsp/
#   https://p4suta.github.io/aozora-tools/aozora_lsp/     ← cargo doc landing
#   https://p4suta.github.io/aozora-tools/aozora_fmt/     ← formatter docs
#   https://p4suta.github.io/aozora-tools/aozora_tools_xtask/

name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy in flight at a time; queue the rest so we never
# partially overwrite the Pages bucket.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build site
    runs-on: ubuntu-latest
    # `cargo doc` rustc-links a thin shim per crate; on a 282-crate
    # workspace that link cost is non-trivial. Mirror ci.yml's mold
    # setup so we get the same ~30 % link-time savings here.
    env:
      RUSTDOCFLAGS: "-C linker=clang -C link-arg=-fuse-ld=mold"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0

      - uses: rui314/setup-mold@v1

      - uses: Swatinem/rust-cache@v2
        with:
          key: docs

      - name: Build rustdoc
        run: cargo doc --workspace --no-deps --document-private-items

      - name: Assemble site
        run: |
          set -euo pipefail
          mkdir -p site
          cp -r target/doc/. site/
          cat > site/index.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8">
          <title>aozora-tools — rustdoc</title>
          <meta http-equiv="refresh" content="0; url=./aozora_lsp/index.html">
          <link rel="canonical" href="./aozora_lsp/index.html">
          <p>Redirecting to <a href="./aozora_lsp/index.html">aozora-lsp API reference</a>.</p>
          HTML
          # GitHub Pages otherwise runs Jekyll and hides paths like `_sources`.
          touch site/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
