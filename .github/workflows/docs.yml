# Publish the aozora-tools handbook + rustdoc API reference to GitHub Pages.
#
# Two-tier layout:
#   https://p4suta.github.io/aozora-tools/         ← mdbook handbook (root)
#   https://p4suta.github.io/aozora-tools/api/     ← rustdoc API reference
#                                                    └─ index → /api/aozora_lsp/

name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy in flight at a time; queue the rest so we never
# partially overwrite the Pages bucket.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build site
    runs-on: ubuntu-latest
    env:
      # `cargo doc` rustc-links a thin shim per crate; mirror ci.yml's
      # mold setup so we get the same ~30 % link-time savings here.
      RUSTDOCFLAGS: "-C linker=clang -C link-arg=-fuse-ld=mold"
    steps:
      - uses: actions/checkout@v6

      - name: Read Rust toolchain version
        id: toolchain
        shell: bash
        run: |
          version=$(awk -F'"' '/^channel/ { print $2; exit }' rust-toolchain.toml)
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.toolchain.outputs.version }}

      - uses: rui314/setup-mold@v1

      - uses: Swatinem/rust-cache@v2
        with:
          key: docs

      # mdbook + mdbook-mermaid as prebuilt binaries (~5s each).
      - uses: taiki-e/install-action@v2
        with:
          tool: mdbook,mdbook-mermaid,lychee

      - name: Build rustdoc
        run: cargo doc --workspace --no-deps --document-private-items

      - name: Install mermaid assets
        run: mdbook-mermaid install crates/aozora-tools-book

      - name: Build handbook
        run: mdbook build crates/aozora-tools-book

      - name: Lychee link check (handbook)
        run: |
          lychee --offline \
            --config crates/aozora-tools-book/lychee.toml \
            crates/aozora-tools-book/book/

      - name: Assemble two-tier site
        run: |
          set -euo pipefail
          # Handbook root → site root.
          mkdir -p site
          cp -r crates/aozora-tools-book/book/. site/

          # Rustdoc → /api/, with a redirect index landing on aozora_lsp.
          mkdir -p site/api
          cp -r target/doc/. site/api/
          cat > site/api/index.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8">
          <title>aozora-tools — rustdoc</title>
          <meta http-equiv="refresh" content="0; url=./aozora_lsp/index.html">
          <link rel="canonical" href="./aozora_lsp/index.html">
          <p>Redirecting to <a href="./aozora_lsp/index.html">aozora-lsp API reference</a>.</p>
          HTML

          # GitHub Pages otherwise runs Jekyll and hides paths like `_sources`.
          touch site/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
