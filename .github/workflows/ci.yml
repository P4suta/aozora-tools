# CI for aozora-tools.
#
# Runs on every push and PR to main. The aozora dependency is fetched
# from the public sibling repo (P4suta/aozora) at the pinned tag; the
# only checkout this workflow needs is aozora-tools itself.
#
# Build optimisation policy (per Fairy Devices 2025-01-07 +
# Aleksey Kladov 2021 + rust-perf-book):
#   - mold linker on Linux (rui314/setup-mold)
#   - sccache with the GHA backend (mozilla-actions/sccache-action)
#   - target-dir cache via Swatinem/rust-cache@v2 with shared-key so
#     fmt/clippy/test/doc/bench-build all reuse one cache slot
#   - cargo-nextest for parallel test execution (taiki-e/install-action)
#   - CARGO_PROFILE_DEV_DEBUG=line-tables-only to halve the target
#     directory (panic backtraces still resolve to file:line)
#   - CARGO_INCREMENTAL=0 (CI runs are mostly cold; incremental adds
#     overhead and bloats the cache)
#   - RUSTFLAGS=-D warnings as a belt-and-braces gate alongside the
#     workspace `[lints]` settings

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: line-tables-only
  CARGO_NET_RETRY: 10
  # mold via setup-mold (below) is the linker; clang is the driver.
  # `-D warnings` keeps the workspace `[lints]` policy honoured even
  # for crates that don't inherit it through workspace.lints.
  RUSTFLAGS: -D warnings -C linker=clang -C link-arg=-fuse-ld=mold
  RUSTDOCFLAGS: -D warnings -C linker=clang -C link-arg=-fuse-ld=mold
  # NB: sccache via mozilla-actions/sccache-action was tried with the
  # GHA Cache backend but the runner-side sccache init writes a probe
  # blob (`.sccache_check`) at startup and the action exits non-zero
  # if that write fails. Whenever the GHA Cache API has a transient
  # outage (which it does, see GitHub Actions status history), every
  # job in this matrix dies on a 400 from the cache API before any
  # cargo invocation runs. Swatinem/rust-cache@v2 below already gives
  # us the bulk of the wins (target-dir + registry caching) without
  # the fail-fast surface; sccache stays off until the action grows a
  # `--tolerate-cache-failures` flag or we move to a more resilient
  # backend (s3 / cloud storage).

jobs:
  rust:
    name: rust (fmt + clippy + test + doc + bench)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy

      # mold: Linux x86_64 link speed-up (~5-10× over GNU ld). The
      # action installs the latest stable mold from upstream releases
      # — newer than apt's package. RUSTFLAGS above injects
      # `-C linker=clang -C link-arg=-fuse-ld=mold` so cargo picks it
      # up; we don't put that in .cargo/config.toml because then any
      # environment without mold (docs.yml runner before this action,
      # fresh dev clones, fork PRs) would fail at link time.
      - name: Install mold linker
        uses: rui314/setup-mold@v1

      - name: Cache cargo target / registry
        uses: Swatinem/rust-cache@v2
        with:
          # Single shared cache slot for every step in this job.
          shared-key: aozora-tools-ci
          # Save cache only on main pushes — PR runs only restore.
          # Saves GHA cache quota and avoids racing parallel PRs.
          save-if: ${{ github.ref == 'refs/heads/main' }}

      # cargo-nextest pulled as a precompiled binary (~5s) instead of
      # `cargo install --locked cargo-nextest` (~3 min compile).
      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: fmt --check
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: nextest
        run: cargo nextest run --workspace --all-targets --locked

      - name: doc test
        run: cargo test --doc --workspace --locked

      - name: doc (deny broken intra-doc links)
        run: cargo doc --workspace --no-deps --document-private-items --locked

      # Catch bench-harness compile breakage without paying the linker
      # cost of building the criterion binaries we'll never run in CI.
      # `cargo check --benches` type-checks the same code path through
      # `harness = false` benches in `[[bench]]` declarations and is
      # noticeably cheaper than `bench --no-run` on a warm cache.
      - name: check benches (compile-only)
        run: cargo check --benches --workspace --locked

  typos:
    name: typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: crate-ci/typos@v1

  vscode:
    name: vscode extension (biome + tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install
        working-directory: editors/vscode
        run: bun install --frozen-lockfile
      - name: Check (biome + tsc, no writes)
        working-directory: editors/vscode
        run: bun run check
