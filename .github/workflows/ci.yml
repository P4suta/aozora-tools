# CI for aozora-tools.
#
# Runs on every push and PR to main. The aozora dependency is fetched
# from the public sibling repo (P4suta/aozora) at the pinned v0.2.0
# tag; the only checkout this workflow needs is aozora-tools itself.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  rust:
    name: rust (fmt + clippy + test + doc)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: fmt --check
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: build
        run: cargo build --workspace --all-targets --locked

      - name: test
        run: cargo test --workspace --all-targets --locked

      - name: doc (deny broken intra-doc links)
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps --document-private-items --locked

      - name: bench --no-run
        run: cargo bench --workspace --no-run --locked

  typos:
    name: typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crate-ci/typos@v1

  vscode:
    name: vscode extension (biome + tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install
        working-directory: editors/vscode
        run: bun install --frozen-lockfile
      - name: Check (biome + tsc, no writes)
        working-directory: editors/vscode
        run: bun run check
