# CI for aozora-tools.
#
# Runs on every push and PR to main. The aozora dependency is fetched
# from the public sibling repo at the pinned tag; the only checkout
# this workflow needs is aozora-tools itself.
#
# Build optimisations:
#   - mold linker on Linux (rui314/setup-mold)
#   - target-dir cache via Swatinem/rust-cache@v2 with shared-key so
#     fmt/clippy/test/doc/bench-build all reuse one cache slot
#   - cargo-nextest for parallel test execution (taiki-e/install-action)
#   - CARGO_PROFILE_DEV_DEBUG=line-tables-only to halve the target
#     directory (panic backtraces still resolve to file:line)
#   - CARGO_INCREMENTAL=0 (CI runs are mostly cold; incremental adds
#     overhead and bloats the cache)
#   - RUSTFLAGS=-D warnings as a belt-and-braces gate alongside the
#     workspace `[lints]` settings

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: line-tables-only
  CARGO_NET_RETRY: 10
  # mold via setup-mold (below) is the linker; clang is the driver.
  # `-D warnings` keeps the workspace `[lints]` policy honoured even
  # for crates that don't inherit it through workspace.lints.
  RUSTFLAGS: -D warnings -C linker=clang -C link-arg=-fuse-ld=mold
  RUSTDOCFLAGS: -D warnings -C linker=clang -C link-arg=-fuse-ld=mold
  # sccache is intentionally not configured. Swatinem/rust-cache@v2
  # below provides the target-dir + registry caching wins without
  # the additional moving parts.

jobs:
  rust:
    name: rust (fmt + clippy + test + doc + bench)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read Rust toolchain version
        id: toolchain
        shell: bash
        run: |
          version=$(awk -F'"' '/^channel/ { print $2; exit }' rust-toolchain.toml)
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.toolchain.outputs.version }}
          components: rustfmt, clippy

      # mold: Linux x86_64 link speed-up (~5-10× over GNU ld). The
      # action installs the latest stable mold from upstream releases
      # — newer than apt's package. RUSTFLAGS above injects
      # `-C linker=clang -C link-arg=-fuse-ld=mold` so cargo picks it
      # up; we don't put that in .cargo/config.toml because then any
      # environment without mold (docs.yml runner before this action,
      # fresh dev clones, fork PRs) would fail at link time.
      - name: Install mold linker
        uses: rui314/setup-mold@v1

      - name: Cache cargo target / registry
        uses: Swatinem/rust-cache@v2
        with:
          # Single shared cache slot for every step in this job.
          shared-key: aozora-tools-ci
          # Save cache only on main pushes — PR runs only restore.
          # Saves GHA cache quota and avoids racing parallel PRs.
          save-if: ${{ github.ref == 'refs/heads/main' }}

      # cargo-nextest pulled as a precompiled binary (~5s) instead of
      # `cargo install --locked cargo-nextest` (~3 min compile).
      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: fmt --check
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: nextest
        # `--features aozora-lsp/shuttle-tests` enables the
        # randomized-schedule concurrency checker
        # (`crates/aozora-lsp/tests/shuttle_doc_state.rs`). Without it
        # that test would only execute inside the `coverage` job (which
        # uses `--all-features`), so a coverage-side regression could
        # mask a shuttle failure. The default 1,000 iterations finish
        # in a few seconds; nightly cron raises `AOZORA_SHUTTLE_ITERS`.
        run: cargo nextest run --workspace --all-targets --features aozora-lsp/shuttle-tests --locked

      - name: doc test
        run: cargo test --doc --workspace --locked

      - name: doc (deny broken intra-doc links)
        run: cargo doc --workspace --no-deps --document-private-items --locked

      # Catch bench-harness compile breakage without paying the linker
      # cost of building the criterion binaries we'll never run in CI.
      # `cargo check --benches` type-checks the same code path through
      # `harness = false` benches in `[[bench]]` declarations and is
      # noticeably cheaper than `bench --no-run` on a warm cache.
      - name: check benches (compile-only)
        run: cargo check --benches --workspace --locked

  # MSRV gate. The workspace declares `rust-version = "1.95.0"` in
  # `Cargo.toml` and pins the same channel in `rust-toolchain.toml`;
  # this job verifies that the codebase actually compiles on that
  # exact toolchain. Without it, a contributor (or a future channel
  # bump on the canonical toolchain) could land code that uses a
  # feature unavailable on the declared MSRV without anything
  # noticing until a downstream consumer hit the failure.
  #
  # `cargo check` is sufficient — MSRV regressions are caught by the
  # type / borrow checker. The `rust` job above covers the actual
  # test run on the canonical channel.
  msrv:
    name: msrv (Rust 1.95.0 cargo check)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust 1.95.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0

      - name: Install mold linker
        uses: rui314/setup-mold@v1

      # Separate cache slot from the `rust` job because the toolchain
      # version is part of the target-dir fingerprint.
      - name: Cache cargo target / registry
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: aozora-tools-msrv
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: cargo check (MSRV)
        run: cargo check --workspace --all-features --all-targets --locked

  typos:
    name: typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: crate-ci/typos@v1

  vscode:
    name: vscode extension (biome + tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install
        working-directory: editors/vscode
        run: bun install --frozen-lockfile
      - name: Check (biome + tsc, no writes)
        working-directory: editors/vscode
        run: bun run check

  # Coverage via `cargo llvm-cov nextest`. Runs in its own job so:
  #   - the instrumented build doesn't poison the `rust` job's cache
  #     (instrument-coverage adds a different RUSTFLAGS fingerprint),
  #   - reports go up as a job summary + artifact independently of
  #     whether `rust` is green (we still want the numbers when a
  #     test fails),
  #   - the gate step is a clean separate red/green signal in the PR
  #     check list.
  #
  # Stable-toolchain story: LLVM `--branch` (true C1) is nightly-only.
  # Region coverage is the closest stable analogue — LLVM emits one
  # MC region per `if` / `match` arm, so each branch counts
  # independently. The gate uses `--fail-under-regions` instead of
  # `--fail-under-branches`. A PR that drives line coverage below 80%
  # or region coverage below 70% fails the gate step.
  coverage:
    name: coverage (llvm-cov, line + region)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read Rust toolchain version
        id: toolchain
        shell: bash
        run: |
          version=$(awk -F'"' '/^channel/ { print $2; exit }' rust-toolchain.toml)
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.toolchain.outputs.version }}
          # `llvm-tools-preview` ships `llvm-profdata` / `llvm-cov`,
          # which `cargo-llvm-cov` shells out to. Already pinned in
          # rust-toolchain.toml; named here for fork PR runners that
          # bypass the toolchain file.
          components: rustfmt, clippy, llvm-tools-preview

      - name: Install mold linker
        uses: rui314/setup-mold@v1

      # Separate cache slot from the `rust` job: instrument-coverage
      # produces a different target-dir fingerprint, so sharing the
      # `aozora-tools-ci` slot would invalidate the rust job's cache
      # on every run.
      - name: Cache cargo target / registry
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: aozora-tools-coverage
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install cargo-llvm-cov + nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-nextest

      - name: Run instrumented tests + lcov
        # `--no-report` defers report generation so the same `.profraw`
        # set feeds both the lcov artifact and the summary below.
        # No `--branch` flag — that requires nightly; we gate on
        # region coverage instead (see job header).
        # `--ignore-filename-regex` excludes dev tooling (xtask) and
        # binary entry points (LSP/CLI `main.rs`) from the denominator
        # — see `crates/aozora-tools-xtask/src/coverage.rs::IGNORE_FILENAME_REGEX`
        # which keeps this exact same pattern in lockstep with local runs.
        env:
          IGNORE_FILENAME_REGEX: 'aozora-tools-xtask/src/.*|aozora-(lsp|fmt)/src/main\.rs'
        run: |
          # `cargo llvm-cov report --lcov --output-path …/lcov.info`
          # does not auto-create the parent directory; without this
          # mkdir the report step fails with "No such file or
          # directory" before the gate ever runs. Pin both
          # `target/llvm-cov` (lcov.info parent) and the html subdir
          # so the artifact upload at the end of the job has a
          # consistent path to read from on every run.
          mkdir -p target/llvm-cov/html
          cargo llvm-cov nextest \
            --workspace --all-features --no-report \
            --ignore-filename-regex "$IGNORE_FILENAME_REGEX"
          cargo llvm-cov report --lcov \
            --output-path target/llvm-cov/lcov.info \
            --ignore-filename-regex "$IGNORE_FILENAME_REGEX"
          cargo llvm-cov report --html \
            --ignore-filename-regex "$IGNORE_FILENAME_REGEX"

      - name: Coverage summary → job summary
        env:
          IGNORE_FILENAME_REGEX: 'aozora-tools-xtask/src/.*|aozora-(lsp|fmt)/src/main\.rs'
        run: |
          {
            echo '## Coverage'
            echo
            echo '```'
            cargo llvm-cov report --summary-only \
              --ignore-filename-regex "$IGNORE_FILENAME_REGEX"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: gate (line ≥ 80%, region ≥ 70%)
        # Hard gate: a PR that takes coverage below either floor will
        # fail this step. Region coverage is the stable-toolchain
        # analogue of branch coverage; `--fail-under-branches` is
        # nightly-only.
        env:
          IGNORE_FILENAME_REGEX: 'aozora-tools-xtask/src/.*|aozora-(lsp|fmt)/src/main\.rs'
        run: |
          cargo llvm-cov report \
            --fail-under-lines 80 \
            --fail-under-regions 70 \
            --ignore-filename-regex "$IGNORE_FILENAME_REGEX"

      - name: Upload coverage artifact (lcov + html)
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: |
            target/llvm-cov/lcov.info
            target/llvm-cov/html/
          retention-days: 14

  # Supply-chain gate. Mirrors the local `cargo deny check` invocation
  # bacon / lefthook expose to developers; deny.toml at the workspace
  # root is the single source of truth for licence + advisory policy.
  # A separate job (rather than a step inside `rust`) so the failure
  # mode reads cleanly in the PR check list.
  deny:
    name: cargo-deny (licenses + advisories + sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          # `--all-features` mirrors deny.toml's `[graph] all-features = true`;
          # `--manifest-path Cargo.toml` is required because cargo-deny v0.19+
          # otherwise walks `crates/*` looking for Cargo.toml files and trips on
          # the manifest-less `crates/aozora-tools-book` mdbook tree.
          manifest-path: Cargo.toml
          arguments: --all-features --workspace
