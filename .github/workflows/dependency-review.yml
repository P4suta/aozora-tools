# Dependency review on pull requests.
#
# Complements the cargo-deny CI gate: `cargo deny` runs against the
# full workspace and checks the entire transitive graph against our
# licence + advisory rules, while dependency-review focuses on
# *changes* a PR introduces and comments the diff directly in the
# review UI.
#
# Action pinning: @v<major> tags for now; Dependabot will upgrade to
# commit SHA pins on its first sweep.

name: dependency-review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: dependency review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/dependency-review-action@v4
        with:
          # Match the cargo-deny policy: reject any newly introduced
          # advisory of moderate severity or worse.
          fail-on-severity: moderate

          # Mirror deny.toml's license allow-list. Keep this in sync
          # with the full cargo-deny policy; dependency-review is a
          # PR-time canary, not the source of truth.
          #
          # MIT-0 ("MIT No Attribution") is the OSI-approved no-
          # attribution variant of MIT — strictly more permissive
          # than MIT and compatible with our `Apache-2.0 OR MIT`
          # workspace licence. Listed defensively so a future
          # transitive dep on an MIT-0 crate (the recent crates.io
          # micro-utility trend) does not require a re-review.
          allow-licenses: >-
            Apache-2.0,
            Apache-2.0 WITH LLVM-exception,
            MIT,
            MIT-0,
            BSD-2-Clause,
            BSD-3-Clause,
            ISC,
            Unicode-3.0,
            Unicode-DFS-2016,
            CC0-1.0,
            MPL-2.0,
            Zlib

          # Post a summary comment only on failure so clean PRs don't
          # get a no-op drive-by from the bot.
          comment-summary-in-pr: on-failure
