[workspace]
resolver = "3"
members = [
    "crates/aozora-fmt",
    "crates/aozora-lsp",
]

[workspace.package]
version      = "0.1.0"
edition      = "2024"
rust-version = "1.95.0"
license      = "Apache-2.0 OR MIT"
authors      = ["aozora-tools contributors"]
repository   = "local-only"

[workspace.dependencies]
# afm library surface — path deps into the sibling `afm` repo.
# When afm is ready to cut a tag, flip these to
#   afm-parser = { git = "https://github.com/P4suta/afm", tag = "v0.1.0" }
# per ADR-0009 (in the afm repo).
afm-parser   = { path = "../afm/crates/afm-parser" }
afm-lexer    = { path = "../afm/crates/afm-lexer" }
afm-syntax   = { path = "../afm/crates/afm-syntax" }
afm-encoding = { path = "../afm/crates/afm-encoding" }

# Internal workspace members
aozora-fmt = { path = "crates/aozora-fmt" }

# CLI
clap   = { version = "4.6.1", features = ["derive", "wrap_help"] }
anyhow = "1.0"

# LSP runtime
tower-lsp          = "0.20"
tokio              = { version = "1", features = ["rt-multi-thread", "io-std", "macros", "sync"] }
serde              = { version = "1", features = ["derive"] }
serde_json         = "1"
dashmap            = "6"
tracing            = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }

[workspace.lints.rust]
unsafe_code = "forbid"
dead_code   = "deny"

[workspace.lints.clippy]
pedantic = { level = "warn", priority = -1 }

[profile.release]
lto           = "thin"
codegen-units = 1
strip         = "symbols"
opt-level     = 3
