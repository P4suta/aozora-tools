[workspace]
resolver = "3"
members = [
    "crates/aozora-fmt",
    "crates/aozora-lsp",
]

[workspace.package]
version      = "0.1.0"
edition      = "2024"
rust-version = "1.95.0"
license      = "Apache-2.0 OR MIT"
authors      = ["aozora-tools contributors"]
repository   = "local-only"

[workspace.dependencies]
# afm library surface — tag-pinned git dep.
#
# Currently a `file://` URL pointing at the local `afm` checkout so
# the v0.1.0 tag resolution flow is exercised end-to-end without
# needing GitHub availability. When afm is pushed public, swap the
# URL with a single sd invocation:
#
#   sd 'file:///home/yasunobu/projects/afm' \
#      'https://github.com/P4suta/afm' Cargo.toml
#
# The `tag = "v0.1.0"` pin is stable across that switch; any
# Cargo.lock entries downstream remain valid because the commit
# SHA the tag resolves to is identical on either origin.
afm-parser   = { git = "file:///home/yasunobu/projects/afm", tag = "v0.1.0" }
afm-lexer    = { git = "file:///home/yasunobu/projects/afm", tag = "v0.1.0" }
afm-syntax   = { git = "file:///home/yasunobu/projects/afm", tag = "v0.1.0" }
afm-encoding = { git = "file:///home/yasunobu/projects/afm", tag = "v0.1.0" }

# Internal workspace members
aozora-fmt = { path = "crates/aozora-fmt" }

# CLI
clap   = { version = "4.6.1", features = ["derive", "wrap_help"] }
anyhow = "1.0"

# LSP runtime
tower-lsp          = "0.20"
tokio              = { version = "1", features = ["rt-multi-thread", "io-std", "macros", "sync"] }
serde              = { version = "1", features = ["derive"] }
serde_json         = "1"
dashmap            = "6"
tracing            = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }

[workspace.lints.rust]
unsafe_code = "forbid"
dead_code   = "deny"

[workspace.lints.clippy]
pedantic = { level = "warn", priority = -1 }

[profile.release]
lto           = "thin"
codegen-units = 1
strip         = "symbols"
opt-level     = 3
