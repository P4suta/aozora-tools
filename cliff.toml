# git-cliff configuration for aozora-tools.
#
# Generates CHANGELOG.md and GitHub release notes from the Conventional
# Commits history enforced by lefthook. Used by:
#
#   * `git cliff --output CHANGELOG.md`        — regenerate CHANGELOG.md
#   * `.github/workflows/release.yml`          — generate GitHub release
#                                                notes for a tag
#
# The two invocations share this config so CHANGELOG.md and the release
# page always agree.

[changelog]
header = """
# Changelog

All notable changes to aozora-tools are recorded in this file. The
format follows [Keep a Changelog](https://keepachangelog.com/en/1.1.0/);
the project adheres to
[Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""
body = """
{% if version -%}
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
    ## [Unreleased]
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}

{% for commit in commits %}\
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | upper_first }}\
{%- if commit.remote.pr_number %} (#{{ commit.remote.pr_number }}){% endif %}
{% endfor %}
{% endfor %}
"""
footer = """
<!-- generated by git-cliff -->
"""
trim = true

[git]
conventional_commits  = true
filter_unconventional = true
split_commits         = false
commit_parsers = [
    { message = "^feat",                 group = "Added" },
    { message = "^fix",                  group = "Fixed" },
    { message = "^perf",                 group = "Performance" },
    { message = "^refactor",             group = "Changed" },
    { message = "^docs",                 group = "Documentation" },
    { message = "^test",                 group = "Tests" },
    { message = "^ci",                   group = "CI" },
    { message = "^build",                group = "Build" },
    { message = "^chore\\(release\\)",   skip  = true },
    { message = "^chore",                group = "Chore" },
    { message = "^revert",               group = "Reverted" },
]
filter_commits = false
tag_pattern    = "v[0-9]+\\.[0-9]+\\.[0-9]+.*"
skip_tags      = ""
ignore_tags    = ""
topo_order     = false
sort_commits   = "newest"

[remote.github]
owner = "P4suta"
repo  = "aozora-tools"
