# Project-level cargo config.
#
# Linker policy: mold/lld are NOT forced here at the project level
# because doing so would break any environment that doesn't ship the
# linker (CI workflows that forget to install mold, fresh dev
# clones without a system mold package, fork PRs that bypass the
# composite-action setup, etc.). Cargo doesn't support conditional
# linker selection (e.g. "use mold if present, otherwise default").
#
# Instead, the build-time linker is set via RUSTFLAGS in:
#   - .github/workflows/ci.yml  (RUSTFLAGS includes `-C link-arg=-fuse-ld=mold`)
#   - .github/workflows/docs.yml  (same)
# and developers who want the speedup locally can either
#   `export RUSTFLAGS="-C link-arg=-fuse-ld=mold"` in their shell, or
#   create `~/.cargo/config.toml` with the per-target stanza.
#
# Reference: https://github.com/rui314/mold

[net]
# CI on slow / flaky networks benefits from extra retries on cargo
# registry fetches. Default is 3; bumping to 10 matches the GitHub
# Actions Rust template recommendation.
retry = 10

[term]
verbose = false
